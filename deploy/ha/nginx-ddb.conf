# DarshJDB HA — front-door load balancer
# Routes HTTP + WebSocket traffic round-robin across 3 DarshJDB replicas.
#
# WebSocket sticky routing: a WS subscription binds to whichever replica
# accepted the handshake. Cross-replica change fanout works because the
# triple store issues `pg_notify` on every tx commit; each replica
# LISTENs on `ddb_changes` and re-emits the event to its own WS clients.

user  nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  75s;
    client_max_body_size 64m;

    # DarshJDB upstream — use ip_hash so WebSocket reconnects stick to
    # the same replica (avoids silent dropped subscriptions behind NAT).
    upstream ddb_backend {
        ip_hash;
        server ddb-server-1:7700 max_fails=3 fail_timeout=10s;
        server ddb-server-2:7700 max_fails=3 fail_timeout=10s;
        server ddb-server-3:7700 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    # WebSocket upgrade variable
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 7700;
        listen [::]:7700;

        location / {
            proxy_pass http://ddb_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }
    }
}
