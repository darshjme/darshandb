# DarshJDB HA — HAProxy config
# Routes Postgres traffic to the current Patroni leader via the
# Patroni REST API health endpoint (:8008/leader returns 200 on the
# leader and 503 on replicas). Replica-only traffic hits /replica.

global
    log stdout format raw local0 info
    maxconn 2000

defaults
    log     global
    mode    tcp
    retries 2
    timeout client          30m
    timeout connect         4s
    timeout server          30m
    timeout check           5s

# ── Stats UI ────────────────────────────────────────────────────────
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats show-node

# ── Primary (writer) ────────────────────────────────────────────────
listen postgres_primary
    bind *:5432
    option httpchk GET /leader
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-pg-1 patroni-pg-1:5432 maxconn 500 check port 8008
    server patroni-pg-2 patroni-pg-2:5432 maxconn 500 check port 8008
    server patroni-pg-3 patroni-pg-3:5432 maxconn 500 check port 8008

# ── Read-only (replicas) ────────────────────────────────────────────
listen postgres_replicas
    bind *:5433
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-pg-1 patroni-pg-1:5432 maxconn 500 check port 8008
    server patroni-pg-2 patroni-pg-2:5432 maxconn 500 check port 8008
    server patroni-pg-3 patroni-pg-3:5432 maxconn 500 check port 8008
