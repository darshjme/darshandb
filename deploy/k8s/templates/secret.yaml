apiVersion: v1
kind: Secret
metadata:
  name: {{ include "darshandb.fullname" . }}-secret
  labels:
    {{- include "darshandb.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  database-url: {{ printf "postgres://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "darshandb.fullname" .) .Values.postgresql.auth.database | b64enc | quote }}
