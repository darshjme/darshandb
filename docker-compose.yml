services:
  darshjdb:
    build: .
    ports:
      - "7700:7700"
    environment:
      DATABASE_URL: postgres://darshan:darshan@postgres:5432/darshjdb
      DDB_PORT: "7700"
      DDB_ADMIN_DIR: /usr/share/darshan/admin
      DDB_JWT_SECRET: ${DDB_JWT_SECRET:-change-me-in-production}
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - darshjdb

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: darshan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darshan}
      POSTGRES_DB: darshjdb
    # Do not expose postgres port externally in production;
    # override in docker-compose.dev.yml when local access is needed.
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/server/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darshan -d darshjdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - darshjdb

volumes:
  pgdata:

networks:
  darshjdb:
    driver: bridge
