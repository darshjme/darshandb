# DarshJDB — release matrix
# Maintained by Darshankumar Joshi (github.com/darshjme)
#
# Builds ddb-server across the supported target matrix and publishes binaries
# to a GitHub Release when a v* tag is pushed. The admin dashboard is built
# first so the server can embed its static assets.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            os_name: linux
            arch_name: x86_64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            os_name: darwin
            arch_name: aarch64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            os_name: windows
            arch_name: x86_64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build admin dashboard
        working-directory: packages/admin
        run: |
          npm ci
          npm run build

      - name: Build ddb-server (${{ matrix.target }})
        run: cargo build --release --target ${{ matrix.target }} -p ddb-server

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p staging
          SRC="target/${{ matrix.target }}/release/ddb-server${{ matrix.ext }}"
          DEST="staging/ddb-server-${TAG}-${{ matrix.os_name }}-${{ matrix.arch_name }}${{ matrix.ext }}"
          cp "$SRC" "$DEST"
          if [[ "${{ matrix.os_name }}" != "windows" ]]; then
            strip "$DEST" 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddb-server-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: staging/*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
